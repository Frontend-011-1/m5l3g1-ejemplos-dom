<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manejo de Eventos en el DOM</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Bootstrap JS -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Mi JS -->
    <script defer src="./assets/js/script.js"></script>
  </head>
  <body>
    <main class="container my-4">
      <h1>Manejando eventos</h1>

      <section class="row">
        <div class="col-md-6">
          <form id="formTarea">
            <div class="mb-3">
              <label for="tarea" class="form-label">Nueva tarea</label>
              <input
                type="text"
                name="tarea"
                id="tarea"
                class="form-control"
                placeholder="Ej: preparar almuerzo"
              />
            </div>
            <button class="btn btn-primary" type="submit" id="botonAgregar">
              Agregar tarea
            </button>
          </form>
        </div>
        <div class="col-md-6">
          <h2>Lista de tareas:</h2>
          <ul class="list-group" id="listaTareas">
            <!-- elementos se insertarán de forma dinámica... -->
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
